<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="gradVideo" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gradAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="gradEmerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#heroBg)"/>
  <circle cx="600" cy="150" r="400" fill="url(#halo)"/>
  <g filter="url(#glow)" opacity="0.15">
    <g transform="translate(100, 150) scale(2)">
      <path d="M0 -70 C0 -20, 20 0, 70 0 C20 0, 0 20, 0 70 C0 20, -20 0, -70 0 C-20 0, 0 -20, 0 -70 Z" fill="url(#grad1)"/>
      <path d="M0 -50 C0 -15, 15 0, 50 0 C15 0, 0 15, 0 50 C0 15, -15 0, -50 0 C-15 0, 0 -15, 0 -50 Z" fill="url(#grad2)" transform="rotate(45)"/>
    </g>
    <g transform="translate(1100, 100) scale(1.5)">
      <path d="M0 -70 C0 -20, 20 0, 70 0 C20 0, 0 20, 0 70 C0 20, -20 0, -70 0 C-20 0, 0 -20, 0 -70 Z" fill="url(#grad2)"/>
      <path d="M0 -50 C0 -15, 15 0, 50 0 C15 0, 0 15, 0 50 C0 15, -15 0, -50 0 C-15 0, 0 -15, 0 -50 Z" fill="url(#grad1)" transform="rotate(45)"/>
    </g>
  </g>
  <text x="600" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white">
    The Ultimate AI Prompt Library
  </text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">
    Curated prompts for image generation, video creation, audio synthesis &amp; agentic workflows
  </text>
  <g transform="translate(300, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#grad1)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Images</text>
  </g>
  <g transform="translate(450, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#gradVideo)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Videos</text>
  </g>
  <g transform="translate(600, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#grad2)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Audio</text>
  </g>
  <g transform="translate(750, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#gradEmerald)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Agents</text>
  </g>
  <g transform="translate(900, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#gradAmber)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Code</text>
  </g>
</svg>