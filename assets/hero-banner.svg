<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="300" fill="url(#heroBg)"/>
  
  <g opacity="0.1">
    <circle cx="100" cy="150" r="200" fill="url(#accent1)"/>
    <circle cx="1100" cy="150" r="180" fill="url(#accent2)"/>
    <circle cx="600" cy="300" r="250" fill="url(#accent3)"/>
  </g>
  
  <g filter="url(#glow1)">
    <circle cx="150" cy="150" r="40" fill="none" stroke="url(#accent1)" stroke-width="2" opacity="0.6"/>
    <circle cx="150" cy="150" r="55" fill="none" stroke="url(#accent1)" stroke-width="1" opacity="0.4"/>
    <circle cx="150" cy="150" r="70" fill="none" stroke="url(#accent1)" stroke-width="0.5" opacity="0.2"/>
    
    <circle cx="1050" cy="150" r="40" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.6"/>
    <circle cx="1050" cy="150" r="55" fill="none" stroke="url(#accent2)" stroke-width="1" opacity="0.4"/>
    <circle cx="1050" cy="150" r="70" fill="none" stroke="url(#accent2)" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <text x="600" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white">
    The Ultimate AI Prompt Library
  </text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">
    Curated prompts for image generation, video creation, audio synthesis &amp; agentic workflows
  </text>
  
  <g transform="translate(300, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#accent1)" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Images</text>
  </g>
  
  <g transform="translate(450, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#accent2)" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Videos</text>
  </g>
  
  <g transform="translate(600, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="url(#accent3)" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Audio</text>
  </g>
  
  <g transform="translate(750, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="#10b981" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Agents</text>
  </g>
  
  <g transform="translate(900, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="#f59e0b" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Code</text>
  </g>
</svg>