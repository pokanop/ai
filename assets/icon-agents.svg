<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#halo)"/>
  <g filter="url(#shadow)">
    <path d="M100 60 L50 130 L150 130 Z" stroke="url(#agentGrad)" stroke-width="4" fill="none" stroke-linejoin="round"/>
    <line x1="100" y1="100" x2="100" y2="60" stroke="url(#agentGrad)" stroke-width="4"/>
    <line x1="100" y1="100" x2="50" y2="130" stroke="url(#agentGrad)" stroke-width="4"/>
    <line x1="100" y1="100" x2="150" y2="130" stroke="url(#agentGrad)" stroke-width="4"/>
    <circle cx="100" cy="60" r="20" fill="url(#agentGrad)" opacity="0.4"/>
    <circle cx="100" cy="60" r="10" fill="url(#agentGrad)"/>
    <circle cx="50" cy="130" r="16" fill="url(#agentGrad)" opacity="0.4"/>
    <circle cx="50" cy="130" r="8" fill="url(#agentGrad)"/>
    <circle cx="150" cy="130" r="16" fill="url(#agentGrad)" opacity="0.4"/>
    <circle cx="150" cy="130" r="8" fill="url(#agentGrad)"/>
    <circle cx="100" cy="100" r="12" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>