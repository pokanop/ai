<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="audGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#halo)"/>
  <g filter="url(#shadow)">
    <rect x="50" y="70" width="12" height="60" rx="6" fill="url(#audGrad)" opacity="0.5"/>
    <rect x="70" y="50" width="12" height="100" rx="6" fill="url(#audGrad)"/>
    <rect x="90" y="30" width="12" height="140" rx="6" fill="url(#audGrad)" opacity="0.8"/>
    <rect x="110" y="50" width="12" height="100" rx="6" fill="url(#audGrad)"/>
    <rect x="130" y="70" width="12" height="60" rx="6" fill="url(#audGrad)" opacity="0.5"/>
  </g>
</svg>