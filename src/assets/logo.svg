<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>
  
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  
  <circle cx="200" cy="200" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <g filter="url(#blur)" opacity="0.5">
    <circle cx="150" cy="120" r="20" fill="url(#glow)"/>
    <circle cx="280" cy="180" r="15" fill="url(#glow)"/>
    <circle cx="180" cy="290" r="18" fill="url(#glow)"/>
  </g>
  
  <g transform="translate(200,200)">
    <path d="M-40,-50 L40,-50 L40,10 L20,10 L20,50 L-20,50 L-20,10 L-40,10 Z" fill="white" opacity="0.9"/>
    <rect x="-30" y="-40" width="60" height="8" rx="2" fill="url(#glow)"/>
    <rect x="-30" y="-26" width="45" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="-30" y="-16" width="55" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
    <circle cx="0" cy="30" r="12" fill="url(#glow)"/>
    <path d="M-5,28 L0,35 L8,25" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <text x="200" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">AI Prompts</text>
  <text x="200" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" letter-spacing="3">SKILLS &amp; FOUNDATIONS</text>
