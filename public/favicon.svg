<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Background glow for soft lighting -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Gradient 1: Indigo to Pink for outer spark -->
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Gradient 2: Cyan to Blue for inner 45-deg spark -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/> <!-- Teal -->
      <stop offset="50%" stop-color="#06B6D4"/> <!-- Cyan -->
      <stop offset="100%" stop-color="#3B82F6"/> <!-- Blue -->
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="90" fill="url(#halo)"/>

  <g transform="translate(100,100)">
    <!-- Base large spark (Vertical/Horizontal) -->
    <path d="M0 -70 
             C0 -20, 20 0, 70 0 
             C20 0, 0 20, 0 70 
             C0 20, -20 0, -70 0 
             C-20 0, 0 -20, 0 -70 Z" 
          fill="url(#grad1)"/>

    <!-- Layered secondary spark (Rotated 45 degrees) -->
    <path d="M0 -50 
             C0 -15, 15 0, 50 0 
             C15 0, 0 15, 0 50 
             C0 15, -15 0, -50 0 
             C-15 0, 0 -15, 0 -50 Z" 
          fill="url(#grad2)" transform="rotate(45)"/>

    <!-- Third inner layer spark for high contrast -->
    <path d="M0 -28 
             C0 -8, 8 0, 28 0 
             C8 0, 0 8, 0 28 
             C0 8, -8 0, -28 0 
             C-8 0, 0 -8, 0 -28 Z" 
          fill="#ffffff" opacity="0.95"/>
  </g>
</svg>
