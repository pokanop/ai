name: Validate Skills

# Spec-compliance gate for skills/<name>/SKILL.md, plus a drift check on the
# generated skills/index.json catalog. Runs on every PR and on pushes to main,
# failing the build before a malformed skill can be silently dropped by the docs
# build, or before the committed catalog falls out of sync with the skills.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # No `bun install` needed: validate-skills.mjs has no dependencies
      # (standard fs/path only), so this stays fast and isolated from the
      # site's dependency graph. This step also fails if skills/index.json has
      # drifted from the skills/ directory — regenerate it with `bun run sync`.
      - name: Validate skills
        run: bun run validate

      # Generate the docs and fail if any relative .md link survived the
      # rewrite (it would 404 on the published site). sync-docs.mjs is also
      # dependency-free, so this stays install-free like the step above. The
      # same check gates the real `bun run build` in deploy.yml; running it here
      # catches broken reference links at PR time, before they reach main.
      - name: Check generated docs for broken reference links
        run: bun run sync
